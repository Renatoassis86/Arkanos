<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Paleta: Dourado #F2C94C | Azul #0B5FA5 | Rosa #E91E63 -->
  <!-- Estilo flat, alto contraste, sem contorno preto -->

  <!-- Base azul -->
  <rect x="40" y="98" width="48" height="10" rx="3" fill="#0B5FA5"/>
  <rect x="46" y="90" width="36" height="8" rx="3" fill="#0B5FA5" opacity="0.9"/>

  <!-- Haste do troféu (suporte) -->
  <rect x="60" y="78" width="8" height="12" rx="2" fill="#F2C94C"/>

  <!-- Taça central (copo) -->
  <path d="M46 36h36v16c0 12-10 22-18 22s-18-10-18-22V36z" fill="#F2C94C"/>

  <!-- Alças laterais da taça -->
  <path d="M82 40c8 0 12 5 12 12 0 6-4 12-10 14v-8c3-1 4-4 4-6 0-4-2-6-6-6v-6z" fill="#F2C94C"/>
  <path d="M46 40c-8 0-12 5-12 12 0 6 4 12 10 14v-8c-3-1-4-4-4-6 0-4 2-6 6-6v-6z" fill="#F2C94C"/>

  <!-- Emblema frontal (círculo rosa) -->
  <circle cx="64" cy="56" r="8" fill="#E91E63"/>

  <!-- Coroa de louros discreta (esquerda) -->
  <g transform="translate(0,0)" fill="#0B5FA5">
    <path d="M36 76c-6-6-8-14-6-22 1-3 3-6 5-8 1-1 3-1 4 0s1 3 0 4c-5 6-6 14-1 20 1 1 1 3 0 4-1 1-3 1-4-1z"/>
    <path d="M40 72c-5-5-6-10-4-16 0-2 2-3 3-3 2 0 3 2 3 3-2 4-1 8 2 12 1 1 1 3 0 4-1 1-3 1-4 0z"/>
  </g>

  <!-- Coroa de louros discreta (direita, espelhada) -->
  <g transform="translate(128,0) scale(-1,1)" fill="#0B5FA5">
    <path d="M36 76c-6-6-8-14-6-22 1-3 3-6 5-8 1-1 3-1 4 0s1 3 0 4c-5 6-6 14-1 20 1 1 1 3 0 4-1 1-3 1-4-1z"/>
    <path d="M40 72c-5-5-6-10-4-16 0-2 2-3 3-3 2 0 3 2 3 3-2 4-1 8 2 12 1 1 1 3 0 4-1 1-3 1-4 0z"/>
  </g>
</svg>
