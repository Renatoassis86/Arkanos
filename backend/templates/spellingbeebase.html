  <style>
    .hidden { display: none; }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
    .pulse-green { animation: pulse 0.5s ease-in-out; color: green; }
    .pulse-red { animation: pulse 0.5s ease-in-out; color: red; }
    @keyframes gradient-x {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .animate-gradient-x {
      background-size: 200% 200%;
      animation: gradient-x 10s ease infinite;
    }


    button {
      transition: all 0.3s ease;
    }

    button:hover {
      transform: scale(1.05);
      transition: transform 0.2s ease-in-out, background-color 0.3s ease;
    }
    button:active {
      transform: scale(0.97);
    }


  </style>
</head>

  <!-- LOGIN SCREEN -->
  <div class="bg-white shadow-xl rounded-2xl p-8 w-full max-w-xl text-center" id="tela-inicial">
    <h1 class="text-3xl font-bold text-yellow-700 mb-4">🐝 Spelling Bee</h1>
    <p class="mb-2">Enter your name and login to start:</p>
    <input id="nome" type="text" placeholder="Full Name (First + Last)" class="border p-2 rounded mb-2 w-full">
    <input id="login" type="text" placeholder="Username (ex: theo2025)" class="border p-2 rounded mb-2 w-full">
    <select id="serie" class="border p-2 rounded mb-4 w-full">
      <option value="">Select Grade</option>
      <option value="2ano">2nd Grade</option>
      <option value="4ano">4th Grade</option>
    </select>
    <button onclick="iniciarJogo()" class="bg-green-600 hover:bg-green-700 text-white py-2 px-4 rounded shadow">✅ Start</button>
    
  </div>

  <!-- GAME SCREEN -->
  <div class="hidden bg-white shadow-xl rounded-2xl p-8 w-full max-w-xl text-center" id="tela-jogo">
    <!-- RANKING SCREEN -->
    <div id="tela-ranking" class="hidden bg-white shadow-2xl rounded-2xl p-8 w-full max-w-2xl text-center">
      <h2 class="text-2xl font-bold text-yellow-700 mb-4">🏆 Spelling Bee Rankings</h2>
      <div id="ranking-conteudo" class="text-left text-sm text-gray-700 mb-6 whitespace-pre-line font-mono max-h-[300px] overflow-y-auto border p-4 rounded shadow-inner bg-gray-50"></div>
      <button onclick="reiniciarJogo()" class="bg-green-600 hover:bg-green-700 text-white py-2 px-6 rounded shadow mt-4">🔁 Try Again</button>
    </div>
    <h1 class="text-2xl font-bold text-yellow-700 mb-2">🐝 Spelling Bee</h1>
    <div class="mb-2 text-lg">Score: <span id="pontos">0</span> | Round: <span id="rodada">0</span></div>
    <div class="text-red-600 mb-4">⏱ Time left: <span id="contador">60</span>s</div>
    <p id="pergunta" class="mb-2">Click "Listen Question" to begin</p>

    <div class="flex flex-col gap-2 mb-4">
      <button onclick="ouvirPergunta()" class="bg-blue-500 hover:bg-blue-600 text-white py-2 px-4 rounded shadow">🔊 Listen Question</button>
      <button onclick="falarFrase()" id="btn-frase" class="hidden bg-purple-500 hover:bg-purple-600 text-white py-2 px-4 rounded shadow">📘 Example Sentence</button>
      <button onclick="falarSignificado()" id="btn-significado" class="hidden bg-orange-500 hover:bg-orange-600 text-white py-2 px-4 rounded shadow">📖 Word Meaning</button>
      <button onclick="falarTexto(palavraAtual.word.split('').join(' '))" id="btn-soletrar" class="hidden bg-pink-500 hover:bg-pink-600 text-white py-2 px-4 rounded shadow">📢 Spell Training</button>
      <button onclick="gravarResposta()" class="bg-yellow-400 hover:bg-yellow-500 text-black py-2 px-4 rounded shadow">🔔 Say the Answer</button>
    </div>

    <div id="resultado" class="text-xl font-semibold mb-4"></div>
    <div class="text-left text-sm"><h3 class="font-bold mb-1">History:</h3><ul id="historico" class="list-disc pl-6 text-gray-600"></ul></div>
  </div>

        { word: "floor", meaning: "The bottom surface of a room.", frase: "The floor is clean." },
        { word: "flower", meaning: "A colorful part of a plant.", frase: "She picked a yellow flower." },
        { word: "fly", meaning: "To move through the air.", frase: "Birds fly in the sky." },
        { word: "food", meaning: "What people and animals eat.", frase: "We brought food for the picnic." },
        { word: "foot", meaning: "The part of the body below the ankle.", frase: "I stepped on a rock with my foot." },
        { word: "forest", meaning: "A large area filled with trees.", frase: "The forest is full of animals." },
        { word: "forget", meaning: "To not remember something.", frase: "Don’t forget your backpack!" },
        { word: "four", meaning: "The number after three.", frase: "She has four pets." },
        { word: "friend", meaning: "Someone you like and trust.", frase: "He is my best friend." },
        { word: "frog", meaning: "A small animal that jumps and croaks.", frase: "The frog is green and wet." },
        { word: "fruit", meaning: "Sweet food that grows on trees or plants.", frase: "She eats fruit every day." },
        { word: "funny", meaning: "Causing laughter or amusement.", frase: "That movie was very funny." }

      ]
    };

    let jogador = {};
let palavraAtual = {};
let pontos = 0;
let rodada = 0;
let palavrasUsadas = [];
let cronometro;

// CÓDIGO JAVASCRIPT CORRIGIDO A PARTIR DO INICIAR RODADA
function iniciarRodada() {
  if (palavrasUsadas.length === bancoPalavras[jogador.serie].length) {
    return mostrarRanking("🏁 You've completed all words!");
  }

  let index;
  do {
    index = Math.floor(Math.random() * bancoPalavras[jogador.serie].length);
  } while (palavrasUsadas.includes(index));

  palavraAtual = bancoPalavras[jogador.serie][index];
  palavrasUsadas.push(index);
  rodada++;

  document.getElementById("rodada").innerText = rodada;
  document.getElementById("btn-frase").classList.remove("hidden");
  document.getElementById("btn-significado").classList.remove("hidden");
  document.getElementById("btn-soletrar").classList.remove("hidden");
  document.getElementById("pergunta").innerText = `Can you spell the next word?`;
  document.getElementById("resultado").innerText = "";

  iniciarContador();
  falarTexto(`Can you spell ${palavraAtual.word}?`);
}

function iniciarContador() {
  let tempo = 60;
  document.getElementById("contador").innerText = tempo;
  clearInterval(cronometro);
  cronometro = setInterval(() => {
    tempo--;
    document.getElementById("contador").innerText = tempo;
    if (tempo <= 0) {
      clearInterval(cronometro);
      desclassificar("⏰ Time's up!");
    }
  }, 1000);
}

function falarTexto(texto) {
  const utterance = new SpeechSynthesisUtterance(texto);
  utterance.lang = 'en-US';
  utterance.rate = 0.7;
  speechSynthesis.speak(utterance);
}

function ouvirPergunta() {
  falarTexto(`Can you spell... ${palavraAtual.word}?`);
}
function falarFrase() {
  falarTexto(`In a sentence: ${palavraAtual.frase}`);
}
function falarSignificado() {
  falarTexto(`It means: ${palavraAtual.meaning}`);
}

function gravarResposta() {
  if (!palavraAtual || !palavraAtual.word) {
  alert("The game has not started yet or the word is undefined.");
  return;
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = 'en-US';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.start();

  recognition.onresult = (event) => {
    const falado = event.results[0][0].transcript.toLowerCase();
    const texto = falado.replace(/[^a-z]/g, '').split('').join('');
    const soletradoCorreto = palavraAtual.word.toLowerCase().split('').join('');

    const resultadoDiv = document.getElementById("resultado");

    if (texto === soletradoCorreto) {
      pontos += 1;
      document.getElementById("pontos").innerText = pontos;
      document.getElementById("som-correto").play();
      resultadoDiv.innerText = `✅ Correct spelling! Score: ${pontos}`;
      resultadoDiv.className = "pulse-green";
      setTimeout(iniciarRodada, 3000);
    } else {
      clearInterval(cronometro);
      document.getElementById("som-erro").play();
      desclassificar(`❌ Wrong spelling!\nExpected: ${palavraAtual.word.toUpperCase()}`);
    }
  };

  recognition.onerror = (event) => {
    alert("Speech recognition error: " + event.error);
  };
}

function adicionarHistorico(palavra) {
  const li = document.createElement("li");
  li.textContent = palavra;
  document.getElementById("historico").appendChild(li);
}

function desclassificar(msg = "🏁 Game Over!") {
  clearInterval(cronometro);
  salvarRanking();
  mostrarRanking(msg);
}

function salvarRanking() {
  const chave = `ranking_${jogador.serie}`;
  let ranking = JSON.parse(localStorage.getItem(chave)) || [];
  const existente = ranking.find(j => j.login === jogador.login);
  if (existente) {
    if (pontos > existente.pontos) existente.pontos = pontos;
  } else {
    ranking.push({ login: jogador.login, nome: jogador.nome, pontos, serie: jogador.serie });
  }
  localStorage.setItem(chave, JSON.stringify(ranking));
}

function mostrarRanking(mensagem = "🏁 Game Over!") {
  const series = ["2ano", "4ano"];
  let rankingFinal = "";

  series.forEach(serie => {
    let ranking = JSON.parse(localStorage.getItem(`ranking_${serie}`)) || [];
    ranking.sort((a, b) => b.pontos - a.pontos);
    rankingFinal += `🎮 Top 10 - ${serie.toUpperCase()}\n\n`;
    ranking.slice(0, 10).forEach((j, i) => {
      rankingFinal += `${i + 1}. ${j.nome} - ${j.pontos} pts\n`;
    });
    rankingFinal += `\n`;
  });

  document.getElementById("ranking-conteudo").innerText = `${mensagem}\n\n${rankingFinal}`;
  document.getElementById("tela-jogo").classList.add("hidden");
  document.getElementById("tela-inicial").classList.add("hidden");
  document.getElementById("tela-ranking").classList.remove("hidden");
  document.getElementById("resultado").innerText = "";
  document.getElementById("historico").innerHTML = "";
}

function reiniciarJogo() {
  document.getElementById("tela-ranking").classList.add("hidden");
  document.getElementById("tela-inicial").classList.remove("hidden");
  document.getElementById("nome").value = "";
  document.getElementById("login").value = "";
  document.getElementById("serie").value = "";
  document.getElementById("historico").innerHTML = "";
}

// Ajusta volume da música de fundo
window.addEventListener("load", () => {
  const musica = document.getElementById("musica-fundo");
  musica.volume = 0.2;

  // Solicita interação para autoplay funcionar
  document.addEventListener('click', () => {
    if (musica && musica.paused) {
      musica.play().catch(() => {});
    }
  }, { once: true });
});

// Sempre que o usuário digitar o nome completo, tenta sugerir o login com base no sobrenome
document.getElementById("nome").addEventListener("input", () => {
  const nomeCompleto = document.getElementById("nome").value.trim();
  const partes = nomeCompleto.split(" ");

  if (partes.length >= 2) {
    const sobrenome = partes[partes.length - 1].toLowerCase();
    const sugestaoLogin = `${sobrenome}2025`;

    // Procura no localStorage se já existe um jogador com esse login
    const series = ["2ano", "4ano"];
    let jogadorExistente = null;

    for (const serie of series) {
      const ranking = JSON.parse(localStorage.getItem(`ranking_${serie}`)) || [];
      jogadorExistente = ranking.find(j => j.login === sugestaoLogin);
      if (jogadorExistente) break;
    }

    // Se encontrar, preenche automaticamente o campo de login
    if (jogadorExistente) {
      document.getElementById("login").value = jogadorExistente.login;
      document.getElementById("serie").value = jogadorExistente.serie || "";
    }
  }
});
