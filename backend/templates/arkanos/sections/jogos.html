{% load static %}

<h2 class="title" style="text-align:center; margin-bottom:40px;">Jogos Interativos Arkanos</h2>
<div class="grid-3" style="gap: 30px;">
  <a href="{% url 'jogos:spellingbee' %}" class="card hover-rise"
    style="padding:24px; display:flex; gap:16px; align-items:center; text-decoration: none; color: inherit; border-radius: 20px;">
    <img src="{% static 'games/spellingbee_icon.svg' %}" width="48" height="48" alt="">

      <h3 class="title" style="font-size:1.2rem; margin:0;">Spelling Bee</h3>

  <a href="{% url 'jogos:radix' %}" class="card hover-rise"

      <h3 class="title" style="font-size:1.2rem; margin:0;">Radix</h3>
      <p class="muted">Soletração e consciência fonológica em português.</p>
    </div>
  </a>

  <a href="{% url 'desafio_dos_sabios:index' %}" class="card hover-rise"
    style="padding:24px; display:flex; gap:16px; align-items:center; text-decoration: none; color: inherit; border-radius: 20px;">

    <div>
      <h3 class="title" style="font-size:1.2rem; margin:0;">Desafio dos Sábios</h3>
      <p class="muted">Teste seus conhecimentos e suba no ranking de Logos.</p>
