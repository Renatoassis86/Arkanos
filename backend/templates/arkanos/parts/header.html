{% load static %}
<header class="navbar" style="background:#fff; position:sticky; top:0; z-index:50; box-shadow:0 1px 0 #e9eef7;">
  <div class="container" style="display:grid; grid-template-columns:auto 1fr auto; align-items:center; gap:14px;">

    <!-- LOGO (caminho certo e classes para não distorcer) -->
    <a href="{% url 'arkanos:home' %}" class="brand" aria-label="Arkanos"
      style="display:flex; align-items:center; min-height:56px;">
      <img src="{% static 'img/icones/logo.png' %}" alt="Arkanos" class="site-logo" decoding="async"
        fetchpriority="high" width="240" height="64">
    </a>

    <nav class="nav-center" style="justify-self:center; display:flex; gap:22px;">
      <a href="#programas">Programas</a>
      <a href="#conteudos">Conteúdos</a>
      <a href="#guardioes">Guardiões</a>
      <a href="{% url 'arkanos:jogos' %}">Jogos</a>
      <a href="#metodologia">Metodologia</a>
    </nav>

    <div class="nav-right" style="justify-self:end; display:flex; gap:10px; align-items: center;">
      {% if user.is_authenticated %}
      <span class="text-slate-600 font-semibold mr-2">Hello, {{ user.first_name|default:user.username }}!</span>
      <a class="btn btn-login" style="background:#f8fafc; color:#475569; border:1px solid #e2e8f0; font-weight:700;"
        href="{% url 'arkanos:logout' %}">Logout</a>
      {% else %}
      <a class="btn btn-login" style="color:var(--brand-700); font-weight:700;"
        href="{% url 'arkanos:login' %}">Login</a>
      <a class="btn btn-signup"
        style="background:var(--brand-700); color:#fff; font-weight:700; padding:8px 18px; border-radius:12px; box-shadow:0 4px 12px rgba(11,95,165,0.2);"
        href="{% url 'arkanos:cadastro' %}">Cadastro</a>
      {% endif %}
    </div>
  </div>
</header>
