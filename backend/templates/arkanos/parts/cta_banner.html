{% load static %}
<section class="section" style="padding: 52px 0;">
  <div
    class="container card hover-rise grid grid-cols-1 lg:grid-cols-[1.1fr_0.9fr] gap-5 items-center bg-white overflow-hidden p-0">
    <div style="padding:22px 22px 22px 26px;">
      <span class="badge">Pronto para começar?</span>
      <h2 class="title" style="font-size:clamp(22px,2.6vw,34px); margin:10px 0 14px;">
        Traga o <span class="text-brand">Trivium vivo</span> para sua família
      </h2>
      <ul class="list-check" style="margin:0 0 16px 0;">
        <li>Cosmovisão cristã integrada a jogos e leituras.</li>
        <li>Trilhas por idade com acompanhamento claro.</li>
        <li>Relatórios simples para os pais.</li>
        <li>Implantação assistida e suporte próximo.</li>
      </ul>

      <div style="display:flex; gap:12px; flex-wrap:wrap;">
        <a href="{% url 'arkanos:demo' %}" class="btn btn-primary">Pedir demonstração</a>
        <a href="{% url 'arkanos:home' %}#programas" class="btn btn-outline">Ver Programas</a>
      </div>
    </div>

    <div style="height:100%; min-height:240px;">
      <img src="{% static 'banners/programa_escolas.jpg' %}" alt="Arkanos para as famílias"
        style="width:100%; height:100%; object-fit:cover; display:block;">
    </div>
  </div>
</section>
