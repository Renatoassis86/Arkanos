<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Paleta: Azul #0B5FA5 (predominante) | Dourado #F2C94C (cruz/halo) | Bege #F7F2E7 (páginas) -->
  <defs>
    <style>
      .azul { stroke:#0B5FA5; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
    </style>
  </defs>

  <!-- Halo suave (anel fino) -->
  <circle cx="64" cy="44" r="22" fill="none" stroke="#F2C94C" stroke-width="2" opacity="0.9"/>

  <!-- Livro aberto -->
  <!-- Capa esquerda -->
  <path class="azul" d="M36 54 c0-6 4-8 8-7 l20 7 v26 l-20-7 c-4-1-8-4-8-9 v-10 z" />
  <!-- Capa direita -->
  <path class="azul" d="M92 54 c0-6-4-8-8-7 l-20 7 v26 l20-7 c4-1 8-4 8-9 v-10 z" />
  <!-- Páginas (bege) -->
  <path d="M64 58 c3 3 6 4 9 4" fill="none" stroke="#F7F2E7" stroke-width="3" stroke-linecap="round"/>
  <path d="M64 62 c3 3 6 4 9 4" fill="none" stroke="#F7F2E7" stroke-width="3" stroke-linecap="round"/>
  <path d="M64 66 c3 3 6 4 9 4" fill="none" stroke="#F7F2E7" stroke-width="3" stroke-linecap="round"/>

  <!-- Cruz dourada central -->
  <g transform="translate(0,0)">
    <rect x="62.5" y="36" width="3" height="16" rx="1.5" fill="#F2C94C"/>
    <rect x="58" y="42.5" width="12" height="3" rx="1.5" fill="#F2C94C"/>
  </g>

  <!-- Linha de base opcional para reforçar leitura em 32px -->
  <!-- <line x1="36" y1="88" x2="92" y2="88" stroke="#0B5FA5" stroke-width="1" opacity="0.2"/> -->
</svg>
