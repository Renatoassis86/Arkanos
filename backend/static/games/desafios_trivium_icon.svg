<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Paleta: Azul #0B5FA5 | Vermelho #D62828 | Rosa #E91E63 | Dourado #F2C94C -->

  <!-- Escudo azul (principal, central) -->
  <path d="M64 20 L92 40 L80 100 L48 100 L36 40 Z" 
        fill="#0B5FA5" stroke="#0B5FA5" stroke-width="2"/>

  <!-- Escudo vermelho (secundário esquerda) -->
  <path d="M34 34 L54 50 L46 94 L24 94 L18 50 Z" 
        fill="#D62828" stroke="#D62828" stroke-width="2" opacity="0.9"/>

  <!-- Escudo rosa (secundário direita) -->
  <path d="M94 34 L110 50 L102 94 L80 94 L72 50 Z" 
        fill="#E91E63" stroke="#E91E63" stroke-width="2" opacity="0.9"/>

  <!-- Estrela dourada central -->
  <polygon points="64,48 68,60 80,60 70,68 74,80 64,72 54,80 58,68 48,60 60,60" 
           fill="#F2C94C" stroke="#F2C94C" stroke-width="1"/>
</svg>
